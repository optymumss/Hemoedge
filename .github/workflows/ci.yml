name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Non-secret: this is the publishable/anon key, meant to ship in the
  # client bundle. RLS is the real security boundary, not this key.
  NEXT_PUBLIC_SUPABASE_URL: https://uktdipvvnbgzasqlpudl.supabase.co
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ByF8gifdSfyj1Iktr9PrSw_car33S1W

jobs:
  checks:
    name: Type check, lint, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
